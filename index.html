<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見鑫實業有限公司</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ds-primary:#cc785c; --ds-primary-active:#a9583e; --ds-primary-disabled:#e6dfd8;
      --ds-canvas:#faf9f5; --ds-surface-soft:#f5f0e8; --ds-surface-card:#efe9de;
      --ds-surface-cream-strong:#e8e0d2; --ds-surface-dark:#181715;
      --ds-hairline:#e6dfd8; --ds-ink:#141413; --ds-body:#3d3d3a;
      --ds-muted:#6c6a64; --ds-muted-soft:#8e8b82;
      --ds-on-primary:#ffffff; --ds-on-dark:#faf9f5; --ds-on-dark-soft:#a09d96;
      --ds-font-display:'Cormorant Garamond',Georgia,serif;
      --ds-font-body:'Inter',-apple-system,sans-serif;
      --ds-shadow-subtle:0 1px 3px rgba(20,20,19,0.08);
      --ds-shadow-focus:0 0 0 3px rgba(204,120,92,0.15);
      --ds-radius-md:8px; --ds-radius-lg:12px; --ds-radius-xl:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--ds-font-body);font-size:16px;line-height:1.55;color:var(--ds-body);background:var(--ds-canvas);-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block}
    a{color:inherit;text-decoration:none}
    ul{list-style:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit}

    .container{width:100%;max-width:1200px;margin:0 auto;padding:0 32px}
    .container--narrow{max-width:800px;margin:0 auto;padding:0 32px}
    .section{padding:96px 0}
    .section--soft{background:var(--ds-surface-soft)}
    .section--dark{background:var(--ds-surface-dark);color:var(--ds-on-dark)}

    /* NAV */
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,249,245,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--ds-hairline);transition:box-shadow 0.2s}
    .nav--scrolled{box-shadow:var(--ds-shadow-subtle)}
    .nav__inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1200px;margin:0 auto;padding:0 32px}
    .nav__logo{font-family:var(--ds-font-display);font-size:22px;font-weight:500;color:var(--ds-ink);cursor:pointer;letter-spacing:-0.3px}
    .nav__links{display:flex;align-items:center;gap:32px}
    .nav__link{font-size:14px;font-weight:500;color:var(--ds-muted);transition:color 0.15s;position:relative;padding-bottom:2px}
    .nav__link::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:var(--ds-primary);transform:scaleX(0);transform-origin:left;transition:transform 0.2s}
    .nav__link:hover,.nav__link--active{color:var(--ds-ink)}
    .nav__link:hover::after,.nav__link--active::after{transform:scaleX(1)}
    .nav__cta{font-size:14px;font-weight:500;color:var(--ds-on-primary);background:var(--ds-primary);padding:10px 24px;border-radius:var(--ds-radius-md);transition:background 0.15s,transform 0.1s}
    .nav__cta:hover{background:var(--ds-primary-active);transform:translateY(-1px)}
    .nav__hamburger{display:none;flex-direction:column;gap:5px;padding:8px}
    .nav__hamburger span{display:block;width:22px;height:2px;background:var(--ds-ink);border-radius:2px;transition:all 0.2s}
    .mobile-menu{background:var(--ds-canvas);border-top:1px solid var(--ds-hairline);padding:16px 32px;display:flex;flex-direction:column;gap:16px}
    .mobile-menu .m-link{font-size:16px;font-weight:500;color:var(--ds-ink);text-align:left;padding:8px 0}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--ds-font-body);font-size:14px;font-weight:500;border-radius:var(--ds-radius-md);padding:12px 32px;transition:all 0.15s;cursor:pointer;border:none}
    .btn--primary{background:var(--ds-primary);color:var(--ds-on-primary)}
    .btn--primary:hover{background:var(--ds-primary-active);transform:translateY(-1px)}
    .btn--secondary{background:transparent;color:var(--ds-ink);border:1px solid var(--ds-hairline)}
    .btn--secondary:hover{border-color:var(--ds-ink);background:var(--ds-surface-soft)}
    .btn--ghost{background:transparent;color:var(--ds-primary);padding-left:0;padding-right:0}
    .btn--ghost:hover{color:var(--ds-primary-active)}
    .btn--lg{font-size:15px;padding:14px 28px}
    .btn--full{width:100%}

    /* HERO */
    .hero{padding-top:calc(64px + 96px);padding-bottom:96px;background:var(--ds-canvas);overflow:hidden;position:relative}
    .hero::before{content:'';position:absolute;top:-100px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(204,120,92,0.07) 0%,transparent 70%);pointer-events:none}
    .hero__inner{display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:center;max-width:1200px;margin:0 auto;padding:0 32px}
    .hero__eyebrow{font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--ds-primary);margin-bottom:24px}
    .hero__title{font-family:var(--ds-font-display);font-size:64px;font-weight:400;line-height:1.05;letter-spacing:-1.5px;color:var(--ds-ink);margin-bottom:24px}
    .hero__title em{font-style:italic;color:var(--ds-primary)}
    .hero__desc{font-size:16px;color:var(--ds-body);line-height:1.55;margin-bottom:32px;max-width:480px}
    .hero__actions{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .hero__img{border-radius:var(--ds-radius-xl);aspect-ratio:4/3;background:linear-gradient(135deg,var(--ds-surface-card) 0%,var(--ds-surface-cream-strong) 100%);display:flex;align-items:center;justify-content:center;color:var(--ds-muted);font-size:14px}

    /* STATS */
    .stats{background:var(--ds-surface-soft);padding:48px 0;border-top:1px solid var(--ds-hairline);border-bottom:1px solid var(--ds-hairline)}
    .stats__grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center}
    .stats__num{font-family:var(--ds-font-display);font-size:36px;font-weight:500;color:var(--ds-primary);line-height:1;margin-bottom:8px}
    .stats__lbl{font-size:14px;color:var(--ds-muted)}

    /* SECTION HEADER */
    .sh{text-align:center;max-width:640px;margin:0 auto 48px}
    .sh__ey{font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--ds-primary);margin-bottom:16px}
    .sh__ti{font-family:var(--ds-font-display);font-size:36px;font-weight:400;line-height:1.15;letter-spacing:-0.5px;color:var(--ds-ink);margin-bottom:16px}
    .sh__de{font-size:16px;color:var(--ds-muted);line-height:1.55}

    /* CARDS */
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .card{background:var(--ds-surface-card);border-radius:var(--ds-radius-lg);padding:32px;border:1px solid var(--ds-hairline);transition:box-shadow 0.2s,transform 0.2s}
    .card:hover{box-shadow:var(--ds-shadow-subtle);transform:translateY(-2px)}
    .card__icon{width:44px;height:44px;background:rgba(204,120,92,0.1);border-radius:var(--ds-radius-md);display:flex;align-items:center;justify-content:center;margin-bottom:24px;color:var(--ds-primary);font-size:20px}
    .card__title{font-size:18px;font-weight:500;color:var(--ds-ink);margin-bottom:12px}
    .card__desc{font-size:14px;color:var(--ds-muted);line-height:1.55}

    /* SERVICE CARD */
    .svc{background:var(--ds-surface-card);border-radius:var(--ds-radius-lg);padding:32px;border:1px solid var(--ds-hairline);transition:box-shadow 0.2s,transform 0.2s;display:flex;flex-direction:column}
    .svc:hover{box-shadow:0 4px 24px rgba(20,20,19,0.1);transform:translateY(-3px)}
    .svc__num{font-family:var(--ds-font-display);font-size:48px;font-weight:400;color:var(--ds-primary-disabled);line-height:1;margin-bottom:16px}
    .svc__title{font-size:22px;font-weight:500;color:var(--ds-ink);margin-bottom:12px}
    .svc__desc{font-size:14px;color:var(--ds-muted);line-height:1.55;flex:1;margin-bottom:32px}
    .svc__feats{display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--ds-hairline);padding-top:24px}
    .svc__feat{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ds-body)}
    .svc__feat::before{content:'✓';color:var(--ds-primary);font-weight:600;font-size:13px;min-width:16px}

    /* ABOUT */
    .split{display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:center}
    .split__img{border-radius:var(--ds-radius-lg);aspect-ratio:3/4;background:linear-gradient(160deg,var(--ds-surface-card) 0%,var(--ds-surface-cream-strong) 100%);display:flex;align-items:center;justify-content:center;color:var(--ds-muted);font-size:14px;min-height:400px}
    .split__title{font-family:var(--ds-font-display);font-size:36px;font-weight:400;line-height:1.15;letter-spacing:-0.5px;color:var(--ds-ink);margin-bottom:24px}
    .split__body{font-size:16px;color:var(--ds-body);line-height:1.55;margin-bottom:16px}
    .vlist{display:flex;flex-direction:column;gap:16px;margin-top:32px}
    .vlist__item{display:flex;align-items:flex-start;gap:16px}
    .vlist__dot{width:8px;height:8px;min-width:8px;border-radius:50%;background:var(--ds-primary);margin-top:7px}
    .vlist__label{font-size:16px;font-weight:500;color:var(--ds-ink)}
    .vlist__desc{font-size:14px;color:var(--ds-muted);margin-top:2px}

    /* TEAM */
    .team{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:48px}
    .tcard{text-align:center}
    .tcard__av{width:96px;height:96px;border-radius:50%;background:var(--ds-surface-cream-strong);margin:0 auto 16px;border:3px solid var(--ds-hairline);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--ds-muted-soft)}
    .tcard__name{font-size:16px;font-weight:500;color:var(--ds-ink);margin-bottom:4px}
    .tcard__role{font-size:13px;color:var(--ds-primary);font-weight:500;margin-bottom:8px}
    .tcard__bio{font-size:14px;color:var(--ds-muted);line-height:1.55}

    /* CONTACT */
    .clayout{display:grid;grid-template-columns:1fr 1.2fr;gap:96px;align-items:start}
    .ci__title{font-family:var(--ds-font-display);font-size:36px;font-weight:400;line-height:1.15;letter-spacing:-0.5px;color:var(--ds-ink);margin-bottom:24px}
    .ci__desc{font-size:16px;color:var(--ds-muted);line-height:1.55;margin-bottom:32px}
    .cdetails{display:flex;flex-direction:column;gap:24px}
    .cdetail{display:flex;align-items:flex-start;gap:16px}
    .cdetail__icon{width:40px;height:40px;min-width:40px;background:rgba(204,120,92,0.1);border-radius:var(--ds-radius-md);display:flex;align-items:center;justify-content:center;font-size:18px}
    .cdetail__label{font-size:12px;font-weight:500;color:var(--ds-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
    .cdetail__value{font-size:16px;color:var(--ds-ink);font-weight:500}
    .cform{background:var(--ds-surface-card);border-radius:var(--ds-radius-lg);padding:32px;border:1px solid var(--ds-hairline)}
    .fg{margin-bottom:24px}
    .flabel{display:block;font-size:12px;font-weight:500;color:var(--ds-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
    .finput,.ftextarea,.fselect{width:100%;font-family:var(--ds-font-body);font-size:16px;color:var(--ds-ink);background:var(--ds-canvas);border:1px solid var(--ds-hairline);border-radius:var(--ds-radius-md);padding:12px 16px;transition:border-color 0.15s,box-shadow 0.15s;outline:none;appearance:none}
    .finput::placeholder,.ftextarea::placeholder{color:var(--ds-muted-soft)}
    .finput:focus,.ftextarea:focus,.fselect:focus{border-color:var(--ds-primary);box-shadow:var(--ds-shadow-focus)}
    .ftextarea{resize:vertical;min-height:140px;line-height:1.55}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}

    /* FOOTER */
    .footer{background:var(--ds-surface-dark);color:var(--ds-on-dark-soft);padding:96px 0 32px}
    .footer__grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:32px;margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,0.08)}
    .footer__logo{font-family:var(--ds-font-display);font-size:20px;color:var(--ds-on-dark);margin-bottom:16px;display:block}
    .footer__tag{font-size:14px;color:var(--ds-on-dark-soft);line-height:1.55;max-width:260px}
    .footer__col-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:var(--ds-on-dark);margin-bottom:24px}
    .footer__links{display:flex;flex-direction:column;gap:12px}
    .footer__link{font-size:14px;color:var(--ds-on-dark-soft);transition:color 0.15s;padding:0}
    .footer__link:hover{color:var(--ds-on-dark)}
    .footer__bottom{display:flex;align-items:center;justify-content:space-between}
    .footer__copy{font-size:13px;color:var(--ds-on-dark-soft)}

    /* CTA DARK */
    .cta-dark{background:var(--ds-surface-dark);padding:96px 0;text-align:center}
    .cta-dark__title{font-family:var(--ds-font-display);font-size:36px;font-weight:400;color:var(--ds-on-dark);margin-bottom:16px}
    .cta-dark__desc{font-size:16px;color:var(--ds-on-dark-soft);margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto}

    /* SUCCESS */
    .success{text-align:center;padding:64px 0}
    .success__icon{font-size:48px;margin-bottom:24px;color:var(--ds-primary)}
    .success__title{font-family:var(--ds-font-display);font-size:28px;color:var(--ds-ink);margin-bottom:16px}
    .success__desc{font-size:16px;color:var(--ds-muted)}

    /* ANIMATIONS */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fiu{animation:fadeInUp 0.5s ease forwards}
    .d1{animation-delay:0.1s;opacity:0}
    .d2{animation-delay:0.2s;opacity:0}
    .d3{animation-delay:0.3s;opacity:0}

    /* RESPONSIVE */
    @media(max-width:1024px){.stats__grid{grid-template-columns:repeat(2,1fr)}.footer__grid{grid-template-columns:1fr 1fr}}
    @media(max-width:768px){
      .container,.container--narrow{padding:0 24px}
      .nav__links,.nav__cta{display:none}
      .nav__hamburger{display:flex}
      .hero__inner{grid-template-columns:1fr;gap:32px}
      .hero__title{font-size:40px}
      .hero__img{order:-1}
      .grid-3,.split,.clayout{grid-template-columns:1fr;gap:32px}
      .team{grid-template-columns:1fr 1fr}
      .footer__grid{grid-template-columns:1fr}
      .footer__bottom{flex-direction:column;gap:8px;text-align:center}
      .sh__ti{font-size:28px}
    }
    @media(max-width:480px){.hero__title{font-size:32px}.stats__grid{grid-template-columns:1fr 1fr}.team{grid-template-columns:1fr}.hero__actions{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;

function Nav({page,go}){
  const[scrolled,setScrolled]=useState(false);
  const[open,setOpen]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>20);window.addEventListener('scroll',fn);return()=>window.removeEventListener('scroll',fn)},[]);
  const links=[{k:'home',l:'首頁'},{k:'about',l:'關於我們'},{k:'services',l:'服務內容'},{k:'contact',l:'聯絡資訊'}];
  const nav=k=>{go(k);setOpen(false)};
  return(
    <nav className={`nav${scrolled?' nav--scrolled':''}`}>
      <div className="nav__inner">
        <span className="nav__logo" onClick={()=>nav('home')}>見鑫實業</span>
        <ul className="nav__links">
          {links.map(({k,l})=><li key={k}><button className={`nav__link${page===k?' nav__link--active':''}`} onClick={()=>nav(k)}>{l}</button></li>)}
        </ul>
        <button className="nav__cta" onClick={()=>nav('contact')}>立即洽詢</button>
        <button className="nav__hamburger" onClick={()=>setOpen(!open)}>
          <span style={{transform:open?'rotate(45deg) translate(5px,5px)':'none'}}/>
          <span style={{opacity:open?0:1}}/>
          <span style={{transform:open?'rotate(-45deg) translate(5px,-5px)':'none'}}/>
        </button>
      </div>
      {open&&<div className="mobile-menu">
        {links.map(({k,l})=><button key={k} className="m-link" onClick={()=>nav(k)}>{l}</button>)}
        <button className="btn btn--primary" onClick={()=>nav('contact')}>立即洽詢</button>
      </div>}
    </nav>
  );
}

function Home({go}){
  return(<main>
    <section className="hero">
      <div className="hero__inner">
        <div>
          <p className="hero__eyebrow fiu">專業 · 誠信 · 永續</p>
          <h1 className="hero__title fiu d1">以品質為本，<br/><em>成就每一份信賴</em></h1>
          <p className="hero__desc fiu d2">見鑫實業有限公司深耕產業多年，以專業技術與誠信服務，為客戶提供最可靠的解決方案。從原料到成品，每一個環節都嚴格把關。</p>
          <div className="hero__actions fiu d3">
            <button className="btn btn--primary btn--lg" onClick={()=>go('services')}>了解服務內容</button>
            <button className="btn btn--ghost" onClick={()=>go('about')}>認識我們 →</button>
          </div>
        </div>
        <div className="hero__img">公司形象圖片</div>
      </div>
    </section>

    <section className="stats">
      <div className="container">
        <div className="stats__grid">
          {[['20+','年產業經驗'],['500+','合作客戶'],['98%','客戶滿意度'],['50+','專業團隊成員']].map(([n,l],i)=>(
            <div key={i}><div className="stats__num">{n}</div><div className="stats__lbl">{l}</div></div>
          ))}
        </div>
      </div>
    </section>

    <section className="section">
      <div className="container">
        <div className="sh">
          <p className="sh__ey">我們的專長</p>
          <h2 className="sh__ti">全方位專業服務</h2>
          <p className="sh__de">從諮詢規劃到執行交付，見鑫實業提供完整的一站式服務，讓您省心、省力、放心。</p>
        </div>
        <div className="grid-3">
          {[{ic:'◈',ti:'專業諮詢',de:'資深顧問團隊為您量身規劃最適合的解決方案，確保每一項決策都有所依據。'},{ic:'◎',ti:'品質管控',de:'嚴格的品質管理體系，從原料採購到成品出貨，每個環節都符合國際標準。'},{ic:'◇',ti:'售後服務',de:'完善的售後支援體系，專屬服務團隊隨時待命，確保您的業務順暢運行。'}].map((c,i)=>(
            <div className="card" key={i}><div className="card__icon">{c.ic}</div><h3 className="card__title">{c.ti}</h3><p className="card__desc">{c.de}</p></div>
          ))}
        </div>
        <div style={{textAlign:'center',marginTop:'48px'}}>
          <button className="btn btn--secondary" onClick={()=>go('services')}>查看完整服務 →</button>
        </div>
      </div>
    </section>

    <section className="cta-dark">
      <div className="container">
        <p className="sh__ey" style={{color:'var(--ds-primary)'}}>開始合作</p>
        <h2 className="cta-dark__title">準備好與我們合作了嗎？</h2>
        <p className="cta-dark__desc">歡迎與我們聯繫，讓見鑫實業的專業團隊為您提供最佳解決方案。</p>
        <button className="btn btn--primary btn--lg" onClick={()=>go('contact')}>立即聯絡我們</button>
      </div>
    </section>
  </main>);
}

function About(){
  return(<main style={{paddingTop:'64px'}}>
    <section className="section section--soft">
      <div className="container--narrow" style={{textAlign:'center'}}>
        <p className="sh__ey">關於我們</p>
        <h1 style={{fontFamily:'var(--ds-font-display)',fontSize:'48px',fontWeight:400,lineHeight:1.1,letterSpacing:'-1px',color:'var(--ds-ink)'}}>以誠信立業，<br/><em style={{fontStyle:'italic',color:'var(--ds-primary)'}}>以專業興業</em></h1>
        <p style={{fontSize:'16px',color:'var(--ds-muted)',lineHeight:'1.55',marginTop:'16px'}}>見鑫實業有限公司成立於臺灣，歷經二十餘年的深耕，已成為業界值得信賴的夥伴。</p>
      </div>
    </section>
    <section className="section">
      <div className="container">
        <div className="split">
          <div className="split__img">公司歷史圖片</div>
          <div>
            <h2 className="split__title">我們的故事</h2>
            <p className="split__body">見鑫實業自創立以來，始終秉持「品質第一、客戶至上」的經營理念，持續深耕臺灣市場，並逐步拓展至亞太地區。</p>
            <p className="split__body">二十多年來，我們累積了豐富的產業經驗與技術知識，建立了完善的供應鏈體系，為客戶創造最大的價值。</p>
            <div className="vlist">
              {[{l:'專業技術',d:'持續投入研發，確保技術領先'},{l:'誠信經營',d:'透明溝通，建立長久夥伴關係'},{l:'永續發展',d:'重視環境責任，打造綠色供應鏈'}].map((v,i)=>(
                <div className="vlist__item" key={i}><div className="vlist__dot"/><div><div className="vlist__label">{v.l}</div><div className="vlist__desc">{v.d}</div></div></div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
    <section className="section section--soft">
      <div className="container">
        <div className="sh"><p className="sh__ey">核心團隊</p><h2 className="sh__ti">專業陣容</h2><p className="sh__de">每位成員都是各自領域的專家，共同為客戶提供最優質的服務。</p></div>
        <div className="team">
          {[{n:'陳總經理',r:'總經理',b:'擁有25年產業經驗，帶領公司持續成長與創新。'},{n:'林副總',r:'業務副總',b:'深耕客戶關係，建立完善的服務網絡。'},{n:'張協理',r:'技術協理',b:'專精品質管理，確保每項產品符合最高標準。'}].map((m,i)=>(
            <div className="tcard" key={i}><div className="tcard__av">{m.n[0]}</div><div className="tcard__name">{m.n}</div><div className="tcard__role">{m.r}</div><p className="tcard__bio">{m.b}</p></div>
          ))}
        </div>
      </div>
    </section>
  </main>);
}

function Services({go}){
  const list=[
    {ti:'專業諮詢服務',de:'資深顧問團隊提供全面的產業分析與策略規劃，協助您做出最佳決策。',fs:['市場調研分析','競爭環境評估','策略方案規劃','執行路徑建議']},
    {ti:'產品供應服務',de:'完整的供應鏈管理，確保產品品質穩定、交期準確、價格合理。',fs:['原料採購管理','品質檢驗把關','庫存調度優化','準時交貨保證']},
    {ti:'品質管理服務',de:'建立符合國際標準的品質管理體系，從源頭到終端全程監控。',fs:['ISO認證輔導','製程品管設計','不良品處理','持續改善機制']},
    {ti:'客製化解決方案',de:'針對不同產業需求量身打造，提供最適合您業務的專屬方案。',fs:['需求深度訪談','方案客製規劃','彈性調整機制','專屬服務窗口']},
    {ti:'售後技術支援',de:'完善的售後服務體系，確保您的業務持續穩定運行不中斷。',fs:['7×24小時支援','定期健診回訪','技術培訓課程','緊急應變處理']},
    {ti:'國際貿易服務',de:'豐富的國際貿易經驗，協助您拓展亞太市場，開創新商機。',fs:['進出口文件代辦','關稅諮詢服務','海外供應商對接','跨境物流規劃']},
  ];
  return(<main style={{paddingTop:'64px'}}>
    <section className="section section--soft">
      <div className="container--narrow" style={{textAlign:'center'}}>
        <p className="sh__ey">服務內容</p>
        <h1 style={{fontFamily:'var(--ds-font-display)',fontSize:'48px',fontWeight:400,lineHeight:1.1,letterSpacing:'-1px',color:'var(--ds-ink)'}}>全方位專業<em style={{fontStyle:'italic',color:'var(--ds-primary)'}}>服務體系</em></h1>
        <p style={{fontSize:'16px',color:'var(--ds-muted)',lineHeight:'1.55',marginTop:'16px'}}>見鑫實業提供從諮詢、供應、品管到售後的完整服務，一站式滿足您的所有需求。</p>
      </div>
    </section>
    <section className="section">
      <div className="container">
        <div className="grid-3">
          {list.map((s,i)=>(
            <div className="svc" key={i}>
              <div className="svc__num">0{i+1}</div>
              <h3 className="svc__title">{s.ti}</h3>
              <p className="svc__desc">{s.de}</p>
              <ul className="svc__feats">{s.fs.map((f,j)=><li className="svc__feat" key={j}>{f}</li>)}</ul>
            </div>
          ))}
        </div>
      </div>
    </section>
    <section className="cta-dark">
      <div className="container">
        <h2 className="cta-dark__title">找不到符合需求的服務？</h2>
        <p className="cta-dark__desc">歡迎直接與我們聯繫，我們將為您量身規劃最適合的解決方案。</p>
        <button className="btn btn--primary btn--lg" onClick={()=>go('contact')}>聯繫我們</button>
      </div>
    </section>
  </main>);
}

function Contact(){
  const[form,setForm]=useState({name:'',company:'',email:'',phone:'',subject:'',message:''});
  const[done,setDone]=useState(false);
  const set=e=>setForm({...form,[e.target.name]:e.target.value});
  const submit=()=>{
    if(!form.name||!form.email||!form.message){alert('請填寫姓名、Email 及訊息內容');return;}
    setDone(true);
  };
  return(<main style={{paddingTop:'64px'}}>
    <section className="section section--soft">
      <div className="container--narrow" style={{textAlign:'center'}}>
        <p className="sh__ey">聯絡資訊</p>
        <h1 style={{fontFamily:'var(--ds-font-display)',fontSize:'48px',fontWeight:400,lineHeight:1.1,letterSpacing:'-1px',color:'var(--ds-ink)'}}>與我們<em style={{fontStyle:'italic',color:'var(--ds-primary)'}}>取得聯繫</em></h1>
        <p style={{fontSize:'16px',color:'var(--ds-muted)',lineHeight:'1.55',marginTop:'16px'}}>無論是產品諮詢、報價需求或合作洽談，我們的團隊隨時為您服務。</p>
      </div>
    </section>
    <section className="section">
      <div className="container">
        <div className="clayout">
          <div>
            <h2 className="ci__title">聯絡方式</h2>
            <p className="ci__desc">歡迎透過以下任何方式與我們聯繫，我們將於一個工作日內回覆您的訊息。</p>
            <div className="cdetails">
              {[{ic:'📍',l:'公司地址',v:'臺灣某市某區某路某號'},{ic:'📞',l:'聯絡電話',v:'+886-2-XXXX-XXXX'},{ic:'✉️',l:'電子信箱',v:'info@jianxin.com.tw'},{ic:'🕐',l:'服務時間',v:'週一至週五 09:00–18:00'}].map((d,i)=>(
                <div className="cdetail" key={i}><div className="cdetail__icon">{d.ic}</div><div><div className="cdetail__label">{d.l}</div><div className="cdetail__value">{d.v}</div></div></div>
              ))}
            </div>
          </div>
          <div className="cform">
            {done?(
              <div className="success"><div className="success__icon">✓</div><h3 className="success__title">訊息已送出！</h3><p className="success__desc">感謝您的來信，我們將於一個工作日內與您聯繫。</p></div>
            ):(
              <>
                <div className="frow">
                  <div className="fg"><label className="flabel">姓名 *</label><input className="finput" name="name" placeholder="您的姓名" value={form.name} onChange={set}/></div>
                  <div className="fg"><label className="flabel">公司名稱</label><input className="finput" name="company" placeholder="公司／機構名稱" value={form.company} onChange={set}/></div>
                </div>
                <div className="frow">
                  <div className="fg"><label className="flabel">Email *</label><input className="finput" name="email" type="email" placeholder="your@email.com" value={form.email} onChange={set}/></div>
                  <div className="fg"><label className="flabel">聯絡電話</label><input className="finput" name="phone" placeholder="0912-345-678" value={form.phone} onChange={set}/></div>
                </div>
                <div className="fg">
                  <label className="flabel">洽詢主旨</label>
                  <select className="fselect" name="subject" value={form.subject} onChange={set}>
                    <option value="">請選擇洽詢類型</option>
                    <option value="quote">報價詢問</option>
                    <option value="service">服務諮詢</option>
                    <option value="partner">合作洽談</option>
                    <option value="other">其他</option>
                  </select>
                </div>
                <div className="fg"><label className="flabel">訊息內容 *</label><textarea className="ftextarea" name="message" placeholder="請詳述您的需求或問題..." value={form.message} onChange={set}/></div>
                <button className="btn btn--primary btn--lg btn--full" onClick={submit}>送出訊息</button>
              </>
            )}
          </div>
        </div>
      </div>
    </section>
  </main>);
}

function Footer({go}){
  return(
    <footer className="footer">
      <div className="container">
        <div className="footer__grid">
          <div><span className="footer__logo">見鑫實業</span><p className="footer__tag">專業、誠信、永續。二十年深耕，為您提供最可靠的產業夥伴服務。</p></div>
          <div>
            <p className="footer__col-title">快速連結</p>
            <ul className="footer__links">{[['home','首頁'],['about','關於我們'],['services','服務內容'],['contact','聯絡資訊']].map(([k,l])=><li key={k}><button className="footer__link" onClick={()=>go(k)}>{l}</button></li>)}</ul>
          </div>
          <div>
            <p className="footer__col-title">服務項目</p>
            <ul className="footer__links">{['專業諮詢','產品供應','品質管理','售後支援','國際貿易'].map(s=><li key={s}><button className="footer__link" onClick={()=>go('services')}>{s}</button></li>)}</ul>
          </div>
          <div>
            <p className="footer__col-title">聯絡我們</p>
            <ul className="footer__links"><li><span className="footer__link">+886-2-XXXX-XXXX</span></li><li><span className="footer__link">info@jianxin.com.tw</span></li><li><span className="footer__link">週一至週五 09:00–18:00</span></li></ul>
          </div>
        </div>
        <div className="footer__bottom"><p className="footer__copy">© 2024 見鑫實業有限公司 版權所有</p><p className="footer__copy">臺灣製造 · 品質保證</p></div>
      </div>
    </footer>
  );
}

function App(){
  const[page,setPage]=useState('home');
  const go=p=>{setPage(p);window.scrollTo({top:0,behavior:'smooth'})};
  return(<>
    <Nav page={page} go={go}/>
    {page==='home'&&<Home go={go}/>}
    {page==='about'&&<About/>}
    {page==='services'&&<Services go={go}/>}
    {page==='contact'&&<Contact/>}
    <Footer go={go}/>
  </>);
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
