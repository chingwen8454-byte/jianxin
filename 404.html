<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>找不到頁面 - 見鑫實業有限公司</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f5f5f5;
    color: #333;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    text-align: center;
    max-width: 480px;
    background: #fff;
    padding: 60px 40px;
    border-radius: 8px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 80px;
    font-weight: 300;
    color: #2c3e50;
    margin-bottom: 8px;
    letter-spacing: -2px;
  }
  h2 {
    font-size: 20px;
    font-weight: 500;
    color: #2c3e50;
    margin-bottom: 16px;
  }
  p {
    color: #666;
    line-height: 1.7;
    margin-bottom: 8px;
    font-size: 15px;
  }
  .countdown {
    color: #999;
    font-size: 14px;
    margin: 24px 0;
  }
  .countdown strong {
    color: #2c3e50;
    font-size: 16px;
  }
  .btn {
    display: inline-block;
    padding: 12px 32px;
    background: #2c3e50;
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-size: 15px;
    transition: background 0.2s;
  }
  .btn:hover {
    background: #1a252f;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>找不到這個頁面</h2>
    <p>您要找的內容可能已搬移或不存在</p>
    <p class="countdown">將於 <strong id="seconds">3</strong> 秒後自動返回首頁</p>
    <a href="/" class="btn">立即返回首頁</a>
  </div>

<script>
  let seconds = 3;
  const el = document.getElementById('seconds');
  const timer = setInterval(function() {
    seconds--;
    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = '/';
    } else {
      el.textContent = seconds;
    }
  }, 1000);
</script>
</body>
</html>
